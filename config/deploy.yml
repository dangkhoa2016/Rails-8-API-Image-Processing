# Name of your application. Used to uniquely configure containers.
service: rails_8_api_image_processing

# Name of the container image.
# TODO: replace <registry-username> with your Docker Hub / ghcr.io / registry username.
image: <registry-username>/rails_8_api_image_processing

# Deploy to these servers.
# TODO: replace with the public IP (or hostname) of your target server(s).
servers:
  web:
    - <your-server-ip>
  # job:
  #   hosts:
  #     - <your-server-ip>
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  # TODO: replace with the DNS hostname that points to your server.
  host: <your-app-hostname>

  # Health check used by the Kamal proxy to decide when the container is ready
  # and to detect failures during rolling deploys. /up is a built-in Rails endpoint
  # that returns 200 when the app boots without exceptions.
  healthcheck:
    path: /up
    interval: 10
    timeout: 5

# Credentials for your image host.
registry:
  # TODO: uncomment and set the registry server if not using Docker Hub.
  # server: registry.digitalocean.com  # or ghcr.io, etc.
  # TODO: replace <registry-username> with your registry username.
  username: <registry-username>

  # Always use an access token rather than real password when possible.
  # The value is pulled from .kamal/secrets at deploy time.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
# Secrets: RAILS_MASTER_KEY is read from config/master.key via .kamal/secrets.
# Optional: add DEVISE_JWT_SECRET_KEY to .kamal/secrets for independent JWT key rotation.
env:
  secret:
    - RAILS_MASTER_KEY
    # - DEVISE_JWT_SECRET_KEY  # uncomment to set an explicit JWT signing key
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, you should split out job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of processes dedicated to Solid Queue (default: 1)
    # JOB_CONCURRENCY: 3

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Match this to any external database server to configure Active Record correctly
    # Use rails_8_api_image_processing-db for a db accessory server on same machine via local kamal docker network.
    # DB_HOST: 192.168.0.2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"


# Use a persistent storage volume for sqlite database files and local Active Storage files.
# IMPORTANT: For single-server SQLite deployments ensure this path is backed up regularly.
# If you move to a multi-server setup, replace SQLite with a networked database and remove
# the DB volume mapping below.
volumes:
  - "rails_8_api_image_processing_storage:/rails/storage"


# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
